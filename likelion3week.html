<html lang="ko">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개 페이지 -김도형</title>
    <link rel="stylesheet" href="likelion3week.css">
 </head> 

 <body>
    

 <div class="controls">
    <button id="toggleFormBtn" onclick="toggleForm()">아기 사자 추가</button>
    <button onclick="deleteLastCard()">마지막 아기 사자 삭제</button>
    <span>총 <span id="totalCount">6</span>명</span>
   <select id="filterSelect" onchange="filterCards()">
        <option value="전체">전체</option>
        <option value="Frontend">Frontend</option>
        <option value="Backend">Backend</option>
        <option value="Design">Design</option>
    </select>
   </div>

 <div id="addForm" style="display:none;">
    <div class="form-grid">
        <div>
            <label>이름</label>
            <input type="text" id="inputName" placeholder="예: 홍아기사자">
        </div>
        <div>
            <label>파트</label>
            <select id="inputPart">
                <option value="Frontend">Frontend</option>
                <option value="Backend">Backend</option>
                <option value="Design">Design</option>
            </select>
        </div>
    </div>
    <label>관심 기술 (쉼표로 구분)</label>
    <input type="text" id="inputSkills" placeholder="예: JavaScript, React, HTML/CSS">
    <label>한 줄 소개 (요약 카드)</label>
    <input type="text" id="inputShort" placeholder="예: 3주차 DOM 조작 연습 중!">
    <label>자기소개 (상세 카드)</label>
    <textarea id="inputBio" placeholder="예: HTML/CSS로 구조를 만들고..."></textarea>
    <div class="form-grid">
        <div>
            <label>Email</label>
            <input type="email" id="inputEmail" placeholder="예: lion@example.com">
        </div>
        <div>
            <label>Phone</label>
            <input type="text" id="inputPhone" placeholder="예: 010-1234-5678">
        </div>
    </div>
    <label>Website</label>
    <input type="url" id="inputWebsite" placeholder="예: https://example.com">
    <label>한 마디</label>
    <input type="text" id="inputMessage" placeholder="예: 데이터 바뀌면 화면도 바뀐다!">
    <div class="form-buttons">
        <button onclick="addCard()">추가하기</button>
        <button onclick="toggleForm()">취소</button>
    </div>
 </div>

            <div class="card-body">

        <div class="container">
        


            
 <script>
   
    const initialCount = document.querySelectorAll('.card').length;
    document.getElementById('totalCount').textContent = initialCount;

    function toggleForm() {
        const form = document.getElementById('addForm');
        const isHidden = form.style.display === 'none';
        form.style.display = isHidden ? 'flex' : 'none';
    }

    function addCard() {
        const name = document.getElementById('inputName').value.trim();
        const part = document.getElementById('inputPart').value;
        const skills = document.getElementById('inputSkills').value.trim();
        const shortBio = document.getElementById('inputShort').value.trim();
        const bio = document.getElementById('inputBio').value.trim();
        const email = document.getElementById('inputEmail').value.trim();
        const phone = document.getElementById('inputPhone').value.trim();
        const website = document.getElementById('inputWebsite').value.trim();
        const message = document.getElementById('inputMessage').value.trim();

        
        if (!name || !skills || !shortBio || !bio || !email || !website || !message) {
            alert('모든 항목을 입력해주세요.');
            return;
        }

        
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert('올바른 이메일 형식을 입력해주세요.');
            return;
        }

        
        const urlRegex = /^https?:\/\/.+/;
        if (!urlRegex.test(website)) {
            alert('URL을 입력해주세요. (https://로 시작)');
            return;
        }

        
        const container = document.querySelector('.container');
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="https://via.placeholder.com/320x200?text=${encodeURIComponent(name)}" alt="${name}">
            <div class="card-body">
                <h3>${name}</h3>
                <p class="role">${part}</p>
                <p>${shortBio}</p>
            </div>
        `;
        container.appendChild(card);

        
        const countEl = document.getElementById('totalCount');
        countEl.textContent = parseInt(countEl.textContent) + 1;

        
        document.getElementById('inputName').value = '';
        document.getElementById('inputSkills').value = '';
        document.getElementById('inputShort').value = '';
        document.getElementById('inputBio').value = '';
        document.getElementById('inputEmail').value = '';
        document.getElementById('inputPhone').value = '';
        document.getElementById('inputWebsite').value = '';
        document.getElementById('inputMessage').value = '';
        document.getElementById('addForm').style.display = 'none';
    }

    function deleteLastCard() {
        const cards = document.querySelectorAll('.card');
        if (cards.length === 0) {
            alert('삭제할 카드가 없습니다.');
            return;
        }
        cards[cards.length - 1].remove();

        const countEl = document.getElementById('totalCount');
        countEl.textContent = parseInt(countEl.textContent) - 1;
    }
    function updateEmptyState() {
    const cards = document.querySelectorAll('.card');
    const container = document.querySelector('.container');
    let emptyMsg = document.getElementById('emptyMessage');

    if (cards.length === 0) {
        if (!emptyMsg) {
            emptyMsg = document.createElement('p');
            emptyMsg.id = 'emptyMessage';
            emptyMsg.textContent = '아직 등록된 아기사자가 없습니다.';
            container.appendChild(emptyMsg);
        }
    } else {
        if (emptyMsg) emptyMsg.remove();
    }
 }

 function deleteLastCard() {
    const cards = document.querySelectorAll('.card');
    if (cards.length === 0) {
        alert('삭제할 카드가 없습니다.');
        return;
    }
    cards[cards.length - 1].remove();

    const countEl = document.getElementById('totalCount');
    countEl.textContent = parseInt(countEl.textContent) - 1;

    updateEmptyState(); 
}

 function filterCards() {
    const selected = document.getElementById('filterSelect').value;
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
        const role = card.querySelector('.role');
        if (!role) return;

        if (selected === '전체' || role.textContent.trim() === selected) {
            card.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });
}
